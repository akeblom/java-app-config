apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akeblom/java-app-config
    targetRevision: HEAD
    path: charts/java-app
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: java-app-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
